<!-- login/templates/login/base_auth.html -->
{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}">
    <title>Badges — {% block title %}{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-light: #F4F4F4;
            --color-olive: #A4B66B;
            --color-light-olive: #DDE6B6;
            --color-dark-olive: #5F733C;
            --color-mid-olive: #49743F;
            --font-main: 'Montserrat', sans-serif;
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background-color: var(--bg-light);
            font-family: var(--font-main);
            color: #333;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Основной контент — растягивается, центрирует дочерний блок */
        .auth-main {
            flex: 1;
            display: flex;
            align-items: center;       /* вертикальный центр */
            justify-content: center;
            padding: 40px 24px;
        }

        /* Ограничение ширины и центровка */
        .auth-container {
            width: 100%;
            max-width: 1200px;
        }

        /* Футер всегда внизу */
        .auth-footer {
            text-align: center;
            padding: 16px;
            color: #aaa;
            font-size: 0.85rem;
            font-weight: 400;
            border-top: 1px solid #ddd;
        }

        /* Универсальная кнопка назад */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--color-light-olive);
            color: var(--color-dark-olive);
            border-radius: 14px;
            padding: 10px 24px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            transition: background 0.15s;
            margin-bottom: 28px;
        }
        .back-btn:hover { background: #cfd99a; color: var(--color-mid-olive); }

        /* Увеличенные глобальные элементы */
        h2 { font-size: 2rem !important; }
        h3 { font-size: 1.7rem !important; }
        h4 { font-size: 1.4rem !important; }
        h5 { font-size: 1.2rem !important; }

        .table td, .table th {
            font-size: 1.05rem;
            padding: 14px 16px !important;
        }

        .card {
            border-radius: 18px !important;
        }

        .btn {
            font-size: 1rem !important;
            padding: 10px 22px !important;
            border-radius: 12px !important;
        }

        .badge {
            font-size: 0.95rem !important;
            padding: 6px 12px !important;
        }

        /* Тосты */
        .toast-container { z-index: 1055; }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body>

    <main class="auth-main">
        <div class="auth-container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="auth-footer">
        © 2026 Геймификатор
    </footer>

    <!-- Уведомления -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        {% if messages %}
            {% for message in messages %}
                <div class="toast align-items-center text-white border-0 mb-2 shadow
                    {% if message.tags == 'success' %}bg-success
                    {% elif message.tags == 'error' %}bg-danger
                    {% else %}bg-primary{% endif %}" role="alert" aria-live="assertive" aria-atomic="true">
                    <div class="d-flex">
                        <div class="toast-body fs-6">{{ message }}</div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                    </div>
                </div>
            {% endfor %}
        {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var toastElList = [].slice.call(document.querySelectorAll('.toast'));
            var toastList = toastElList.map(function (toastEl) {
                return new bootstrap.Toast(toastEl, { delay: 3000 });
            });
            toastList.forEach(toast => toast.show());
        });
    </script>
</body>
</html>
