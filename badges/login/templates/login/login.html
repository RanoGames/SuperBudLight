<!-- login/templates/login/login.html -->
{% extends 'login/base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<h2>Вход в систему</h2>
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        {{ form.username.label_tag }}
        {{ form.username }}
    </div>
    <div class="mb-3">
        {{ form.password.label_tag }}
        {{ form.password }}
    </div>
    <button type="submit" class="btn btn-success">Войти</button>
</form>
{% endblock %}
